server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend so the mini app and API share the same
    # origin. This avoids mixed-content issues when the mini app is served over
    # HTTPS, and allows the frontend to use relative URLs with no VITE_API_URL
    # needed at build time.
    location ~ ^/(auth|chat|threads|files|settings|models|health) {
        proxy_pass http://aug:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets aggressively; index.html must revalidate
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
