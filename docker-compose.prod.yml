# Production compose file — no Postgres service (uses external DB).
# Intended for Portainer "Repository" deployment: Portainer clones the repo
# and runs docker compose up --build, so no pre-built image or registry needed.
#
# Assumes:
#   - An external Docker network named "backend" where Postgres already lives.
#   - Environment variables supplied via Portainer's "Environment variables" UI
#     (or a .env file if running manually).
#   - Host data directory owned by UID 1000 (the container's appuser):
#       sudo mkdir -p /opt/aug/data && sudo chown -R 1000:1000 /opt/aug/data

services:
  aug:
    build: .
    restart: unless-stopped
    environment:
      HUSHED_DIR: /app/data/hushed
      API_KEY: ${API_KEY}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      DEBUG: ${DEBUG:-false}
    volumes:
      - /opt/aug/data:/app/data
