services:
  aug:
    build: .
    ports:
      - "8012:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://aug:password@postgres:5432/aug
      HUSHED_DIR: /app/data/.hushed
      BROWSER_CDP_URL: http://chromium:9222
      BASE_URL: ${BASE_URL:-http://YOUR_HOST:8012}
      DEV_AUTH_BYPASS: "true"
    env_file: .env
    volumes:
      - ./aug:/app/aug
      - ./data:/app/data
      - browser_downloads:/app/browser-downloads
    command: ["uvicorn", "aug.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      chromium:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aug
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aug
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aug -d aug"]
      interval: 5s
      timeout: 3s
      retries: 10

  chromium:
    build: ./chromium
    environment:
      PUID: 1000
      PGID: 1000
      CHROME_CLI: --remote-debugging-port=9221 --remote-allow-origins=* --no-sandbox --disable-dev-shm-usage
    ports:
      - "3012:3000"
      - "9222:9222"
    volumes:
      - chrome_profile:/config
      - browser_downloads:/app/browser-downloads
    shm_size: 1g
    restart: unless-stopped

  miniapp:
    build:
      context: ./miniapp
      target: builder
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8012}
    volumes:
      - ./miniapp/src:/app/src
      - ./miniapp/public:/app/public
      - ./miniapp/index.html:/app/index.html
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
  chrome_profile:
  browser_downloads:
