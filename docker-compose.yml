services:
  aug:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://aug:password@postgres:5432/aug
      HUSHED_DIR: /app/data/.hushed
      BROWSER_CDP_URL: http://chromium:9222
    env_file: .env
    volumes:
      - ./aug:/app/aug
      - ./data:/app/data
    command: ["uvicorn", "aug.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      chromium:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aug
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aug
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aug -d aug"]
      interval: 5s
      timeout: 3s
      retries: 10

  chromium:
    image: zenika/alpine-chrome:latest
    command: --no-sandbox --headless --disable-gpu --remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --remote-allow-origins=* --disable-dev-shm-usage --disable-logging --log-level=3 about:blank
    shm_size: 2g
    restart: unless-stopped
    ports:
      - "9222:9222"
    logging:
      driver: none

volumes:
  postgres_data:
